name: Build RotateMaster IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generer le projet Xcode
        run: python3 generate_project.py

      - name: Choisir Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app
          xcodebuild -version

      - name: Compiler
        run: |
          xcodebuild \
            -project RotateMaster.xcodeproj \
            -scheme RotateMaster \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEAD_CODE_STRIPPING=NO \
            ONLY_ACTIVE_ARCH=NO \
            build \
            SYMROOT="$PWD/build" \
            2>&1 | tee build_log.txt
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            grep "error:" build_log.txt | head -20
            exit 1
          fi

      - name: Installer ldid
        run: brew install ldid

      - name: Signer et creer IPA
        run: |
          APP=$(find build -name "*.app" | grep -v BuildProductsPath | head -1)
          echo "App trouvee: $APP"
          ldid -SRotateMaster/entitlements.plist "$APP/RotateMaster"
          mkdir -p Payload
          cp -r "$APP" Payload/RotateMaster.app
          zip -r RotateMaster.ipa Payload/
          echo "IPA cree: $(du -sh RotateMaster.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: RotateMaster-IPA
          path: RotateMaster.ipa
          retention-days: 30

      - name: Upload log si erreur
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt
          retention-days: 7
